name: Build Windows App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate icon.ico from icon.png
        shell: pwsh
        run: |
          # Use ImageMagick (pre-installed on windows-latest) to generate a multi-size ICO
          # Squarify first (crop to center square), then produce all standard ICO sizes
          $sizes = @(16, 32, 48, 64, 128, 256)
          $tmpFiles = @()
          foreach ($size in $sizes) {
            $out = "assets/icon_tmp_$size.png"
            magick assets/icon.png -resize "${size}x${size}^" -gravity center -extent "${size}x${size}" -background transparent $out
            $tmpFiles += $out
          }
          magick @tmpFiles assets/icon.ico
          $tmpFiles | ForEach-Object { if (Test-Path $_) { Remove-Item $_ } }

      - name: Build Vite
        run: npx vite build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build Electron NSIS installer + publish to GitHub Releases
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload NSIS installer as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: Senior-Law-Partner-Windows
          path: dist/*.exe
          retention-days: 30
